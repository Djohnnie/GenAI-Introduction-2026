<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGlow)"/>

  <!-- Decorative circles — top right -->
  <circle cx="1750" cy="150" r="460" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="320" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="1750" cy="150" r="200" fill="none" stroke="#6a5fb8" stroke-width="1" opacity="0.25"/>

  <!-- Decorative circles — bottom left -->
  <circle cx="160" cy="960" r="380" fill="url(#circleGlow)"/>
  <circle cx="160" cy="960" r="260" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4" rx="0"/>

  <!-- Chapter label -->
  <text
    x="960" y="440"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="120"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-2">Chapter 1</text>

  <!-- Accent separator -->
  <rect x="660" y="490" width="600" height="4" fill="#8b7fd4" rx="2"/>

  <!-- Chapter title -->
  <text
    x="960" y="590"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="300"
    fill="#c4baea"
    text-anchor="middle"
    letter-spacing="1">Welcome to the AI Revolution!</text>
</svg>
