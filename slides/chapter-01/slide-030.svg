<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>
  <text x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Demo 10 &#x2014; Audio and Image Understanding</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>
  <text x="80" y="195"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="300" fill="#c4baea">
    Go beyond text &#x2014; transcribe audio with Whisper and analyse images with GPT-4o.
  </text>
  <rect x="80" y="235" width="860" height="367" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="510" y="325" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" fill="#8b7fd4">01</text>
  <text x="510" y="400" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="600" fill="#ffffff">Audio — Transcribe</text>
  <rect x="360" y="420" width="300" height="3" fill="#8b7fd4"/>
  <text x="510" y="466" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">GetAudioClient("whisper") then</text>
  <text x="510" y="510" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">TranscribeAudioAsync() in the source language</text>
  <rect x="980" y="235" width="860" height="367" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1410" y="325" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" fill="#8b7fd4">02</text>
  <text x="1410" y="400" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="600" fill="#ffffff">Audio — Translate</text>
  <rect x="1270" y="420" width="280" height="3" fill="#8b7fd4"/>
  <text x="1410" y="466" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">TranslateAudioAsync() transcribes and</text>
  <text x="1410" y="510" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">translates to English in one step</text>
  <rect x="80" y="632" width="860" height="367" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="510" y="722" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" fill="#8b7fd4">03</text>
  <text x="510" y="797" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="600" fill="#ffffff">Image — URL</text>
  <rect x="390" y="817" width="240" height="3" fill="#8b7fd4"/>
  <text x="510" y="863" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Combine TextContent and UriContent</text>
  <text x="510" y="907" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">to send a remote image URL to the agent</text>
  <rect x="980" y="632" width="860" height="367" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1410" y="722" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" fill="#8b7fd4">04</text>
  <text x="1410" y="797" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="600" fill="#ffffff">Image — Inline</text>
  <rect x="1270" y="817" width="280" height="3" fill="#8b7fd4"/>
  <text x="1410" y="863" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Use DataContent with raw bytes</text>
  <text x="1410" y="907" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">to embed an image directly in the message</text>
