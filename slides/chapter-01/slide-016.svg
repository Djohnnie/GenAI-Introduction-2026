<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGlow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <!-- Title -->
  <text x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Context Windows</text>

  <!-- Title underline -->
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <!-- Item 1 -->
  <circle cx="92" cy="207" r="7" fill="#8b7fd4"/>
  <text x="115" y="215"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="600" fill="#ffffff">The model&#x2019;s working memory</text>
  <text x="115" y="253"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Everything the model can &#x201C;see&#x201D; at once: your prompt, conversation history, and injected context</text>

  <!-- Item 2 -->
  <circle cx="92" cy="347" r="7" fill="#8b7fd4"/>
  <text x="115" y="355"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="600" fill="#ffffff">Measured in tokens, not characters</text>
  <text x="115" y="393"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">A typical word is ~1.3 tokens; code tends to be more token-dense than natural language</text>

  <!-- Item 3 -->
  <circle cx="92" cy="487" r="7" fill="#8b7fd4"/>
  <text x="115" y="495"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="600" fill="#ffffff">What goes in the window matters</text>
  <text x="115" y="533"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Relevant files, error messages, and clear instructions produce far better output than vague prompts</text>

  <!-- Item 4 -->
  <circle cx="92" cy="627" r="7" fill="#8b7fd4"/>
  <text x="115" y="635"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="600" fill="#ffffff">Nothing persists between sessions</text>
  <text x="115" y="673"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Once the window closes the model remembers nothing &#x2014; every new chat starts completely blank</text>

  <!-- Item 5 -->
  <circle cx="92" cy="767" r="7" fill="#8b7fd4"/>
  <text x="115" y="775"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="600" fill="#ffffff">Bigger isn&#x2019;t always better</text>
  <text x="115" y="813"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Models can lose focus on content buried in the middle of very long contexts</text>

  <!-- Item 6 -->
  <circle cx="92" cy="907" r="7" fill="#8b7fd4"/>
  <text x="115" y="915"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="600" fill="#ffffff">GitHub Copilot manages context for you</text>
  <text x="115" y="953"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">It automatically selects open files, cursor position, and related code to fill the window intelligently</text>

</svg>