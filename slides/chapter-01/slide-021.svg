<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="cardGlow1" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6b5fb5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cardGlow2" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6b5fb5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cardGlow3" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6b5fb5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGlow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <!-- Title -->
  <text x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Grounding with RAG and Tools</text>

  <!-- Title underline -->
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <!-- ── Flow diagram ── -->

  <!-- User question -->
  <rect x="60" y="168" width="260" height="240" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="190" y="218"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" fill="#8b7fd4" text-anchor="middle">💬</text>
  <text x="190" y="260"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="22" font-weight="600" fill="#ffffff" text-anchor="middle">User</text>
  <text x="190" y="288"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="22" font-weight="600" fill="#ffffff" text-anchor="middle">Question</text>
  <text x="190" y="326"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="300" fill="#c4baea" text-anchor="middle">"What are our</text>
  <text x="190" y="348"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="300" fill="#c4baea" text-anchor="middle">Q3 results?"</text>
  <text x="190" y="390"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="300" fill="#c4baea" text-anchor="middle">+  history</text>

  <!-- Arrow right -->
  <line x1="320" y1="288" x2="390" y2="288" stroke="#8b7fd4" stroke-width="2.5"/>
  <polygon points="390,277 410,288 390,299" fill="#8b7fd4"/>

  <!-- RAG / Tools column -->
  <rect x="410" y="168" width="540" height="110" rx="12" fill="#8b7fd4" fill-opacity="0.22" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="510" y="208"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" fill="#8b7fd4" text-anchor="middle">📚</text>
  <text x="680" y="208"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">RAG</text>
  <text x="680" y="238"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="19" font-weight="300" fill="#c4baea" text-anchor="middle">Embed question → search vector store</text>
  <text x="680" y="262"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="19" font-weight="300" fill="#c4baea" text-anchor="middle">→ retrieve relevant document chunks</text>

  <rect x="410" y="298" width="540" height="110" rx="12" fill="#8b7fd4" fill-opacity="0.22" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="510" y="338"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" fill="#8b7fd4" text-anchor="middle">🔧</text>
  <text x="680" y="338"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">Tools / Functions</text>
  <text x="680" y="368"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="19" font-weight="300" fill="#c4baea" text-anchor="middle">LLM decides to call your code</text>
  <text x="680" y="392"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="19" font-weight="300" fill="#c4baea" text-anchor="middle">→ APIs, databases, live feeds</text>

  <!-- Arrow right from RAG/Tools -->
  <line x1="950" y1="288" x2="1020" y2="288" stroke="#8b7fd4" stroke-width="2.5"/>
  <polygon points="1020,277 1040,288 1020,299" fill="#8b7fd4"/>

  <!-- Context assembly box -->
  <rect x="1040" y="168" width="420" height="240" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="1250" y="204"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="20" font-weight="700" fill="#8b7fd4" text-anchor="middle">Request sent to LLM</text>
  <rect x="1060" y="212" width="380" height="2" fill="#8b7fd4" fill-opacity="0.4"/>
  <text x="1250" y="240"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="600" fill="#8b7fd4" text-anchor="middle">System prompt</text>
  <text x="1250" y="264"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="17" font-weight="300" fill="#c4baea" text-anchor="middle">+ retrieved documents / tool results</text>
  <text x="1250" y="296"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="600" fill="#8b7fd4" text-anchor="middle">Conversation history</text>
  <text x="1250" y="328"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="600" fill="#8b7fd4" text-anchor="middle">User question</text>
  <text x="1250" y="384"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="16" font-weight="300" fill="#a89fd0" text-anchor="middle">All injected into the context window</text>

  <!-- Arrow right to LLM -->
  <line x1="1460" y1="288" x2="1520" y2="288" stroke="#8b7fd4" stroke-width="2.5"/>
  <polygon points="1520,277 1540,288 1520,299" fill="#8b7fd4"/>

  <!-- LLM + Answer -->
  <rect x="1540" y="208" width="160" height="160" rx="12" fill="#ffffff" fill-opacity="0.10" stroke="#8b7fd4" stroke-width="2"/>
  <text x="1620" y="278"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="44" fill="#8b7fd4" text-anchor="middle">🧠</text>
  <text x="1620" y="340"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="22" font-weight="600" fill="#ffffff" text-anchor="middle">LLM</text>

  <!-- Arrow down to answer -->
  <line x1="1700" y1="288" x2="1770" y2="288" stroke="#8b7fd4" stroke-width="2.5"/>
  <polygon points="1770,277 1790,288 1770,299" fill="#8b7fd4"/>

  <rect x="1790" y="228" width="100" height="120" rx="10" fill="#ffffff" fill-opacity="0.08" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1840" y="282"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="30" fill="#8b7fd4" text-anchor="middle">✅</text>
  <text x="1840" y="322"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Answer</text>

  <!-- ── Three cards ── -->

  <!-- Card 1: RAG -->
  <rect x="60" y="440" width="560" height="600" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#8b7fd4" stroke-width="1.5"/>
  <rect x="60" y="440" width="560" height="600" rx="16" fill="url(#cardGlow1)" fill-opacity="0.3"/>

  <text x="340" y="510"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="44" fill="#8b7fd4" text-anchor="middle">📚</text>
  <text x="340" y="568"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">RAG</text>
  <text x="340" y="604"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="300" fill="#a89fd0" text-anchor="middle">Retrieval-Augmented Generation</text>
  <rect x="120" y="622" width="440" height="3" fill="#8b7fd4" fill-opacity="0.5"/>
  <text x="340" y="666"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Documents are pre-embedded</text>
  <text x="340" y="702"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">and stored in a vector store.</text>
  <text x="340" y="748"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">At query time, relevant chunks</text>
  <text x="340" y="784"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">are retrieved and injected</text>
  <text x="340" y="820"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">into the context window.</text>
  <text x="340" y="876"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="300" fill="#a89fd0" text-anchor="middle">PDFs, wikis, product catalogues,</text>
  <text x="340" y="910"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="300" fill="#a89fd0" text-anchor="middle">support docs, internal knowledge</text>

  <!-- Card 2: Tools -->
  <rect x="680" y="440" width="560" height="600" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#8b7fd4" stroke-width="1.5"/>
  <rect x="680" y="440" width="560" height="600" rx="16" fill="url(#cardGlow2)" fill-opacity="0.3"/>

  <text x="960" y="510"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="44" fill="#8b7fd4" text-anchor="middle">🔧</text>
  <text x="960" y="568"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">Tools &amp; Functions</text>
  <text x="960" y="604"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="300" fill="#a89fd0" text-anchor="middle">Real-time data on demand</text>
  <rect x="740" y="622" width="440" height="3" fill="#8b7fd4" fill-opacity="0.5"/>
  <text x="960" y="666"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">The LLM decides when to</text>
  <text x="960" y="702"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">call your code and what</text>
  <text x="960" y="738"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">arguments to pass.</text>
  <text x="960" y="784"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Results are returned to the</text>
  <text x="960" y="820"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">model as tool output.</text>
  <text x="960" y="876"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="300" fill="#a89fd0" text-anchor="middle">Live APIs, databases, sensors,</text>
  <text x="960" y="910"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="300" fill="#a89fd0" text-anchor="middle">calendars, business systems</text>

  <!-- Card 3: Why It Matters -->
  <rect x="1300" y="440" width="560" height="600" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#8b7fd4" stroke-width="1.5"/>
  <rect x="1300" y="440" width="560" height="600" rx="16" fill="url(#cardGlow3)" fill-opacity="0.3"/>

  <text x="1580" y="510"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="44" fill="#8b7fd4" text-anchor="middle">🎯</text>
  <text x="1580" y="568"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">Why It Matters</text>
  <text x="1580" y="604"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="300" fill="#a89fd0" text-anchor="middle">Overcoming training limits</text>
  <rect x="1360" y="622" width="440" height="3" fill="#8b7fd4" fill-opacity="0.5"/>
  <text x="1580" y="666"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Answers grounded in your data</text>
  <text x="1580" y="712"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">No knowledge cutoff</text>
  <text x="1580" y="758"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Reduced hallucination</text>
  <text x="1580" y="804"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Domain-specific expertise</text>
  <text x="1580" y="860"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="300" fill="#a89fd0" text-anchor="middle">The model reasons — your data</text>
  <text x="1580" y="894"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="300" fill="#a89fd0" text-anchor="middle">and systems provide the facts.</text>
</svg>
