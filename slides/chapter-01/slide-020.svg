<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGlow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <!-- Title -->
  <text x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Demo 04 &#x2014; Chat with a Persona</text>

  <!-- Title underline -->
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <!-- Overview text -->
  <text x="80" y="195"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="300" fill="#c4baea">
    Shape the model&#x2019;s behaviour with a system prompt &#x2014; and change the persona mid-conversation.
  </text>

  <!-- ===== BOX 1: Configure (top-left) ===== -->
  <rect x="80" y="235" width="860" height="367" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="510" y="325" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" fill="#8b7fd4">01</text>
  <text x="510" y="400" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="600" fill="#ffffff">Bootstrap</text>
  <rect x="430" y="420" width="160" height="3" fill="#8b7fd4"/>
  <text x="510" y="466" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Create a session, call RunAsync() once</text>
  <text x="510" y="510" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">to initialise the in-memory state</text>

  <!-- ===== BOX 2: Inject Persona (top-right) ===== -->
  <rect x="980" y="235" width="860" height="367" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1410" y="325" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" fill="#8b7fd4">02</text>
  <text x="1410" y="400" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="600" fill="#ffffff">Inject Persona</text>
  <rect x="1290" y="420" width="240" height="3" fill="#8b7fd4"/>
  <text x="1410" y="466" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Add a ChatRole.System message directly</text>
  <text x="1410" y="510" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">into the session&#x2019;s StateBag history</text>

  <!-- ===== BOX 3: Stream (bottom-left) ===== -->
  <rect x="80" y="632" width="860" height="367" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="510" y="722" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" fill="#8b7fd4">03</text>
  <text x="510" y="797" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="600" fill="#ffffff">Stream</text>
  <rect x="430" y="817" width="160" height="3" fill="#8b7fd4"/>
  <text x="510" y="863" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Manually add the user message to history,</text>
  <text x="510" y="907" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">then call RunStreamingAsync(session)</text>

  <!-- ===== BOX 4: Evolve (bottom-right) ===== -->
  <rect x="980" y="632" width="860" height="367" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1410" y="722" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" fill="#8b7fd4">04</text>
  <text x="1410" y="797" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="600" fill="#ffffff">Evolve</text>
  <rect x="1330" y="817" width="160" height="3" fill="#8b7fd4"/>
  <text x="1410" y="863" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Append a new system message each turn</text>
  <text x="1410" y="907" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">to shift the persona dynamically</text>

</svg>
