  <text x="340" y="602"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">What Is an Embedding?</text>
  <rect x="120" y="620" width="440" height="3" fill="#8b7fd4" fill-opacity="0.5"/>
  <text x="340" y="664"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
