  <text x="340" y="752"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Similar meaning → nearby in space</text>
  <text x="340" y="796"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
