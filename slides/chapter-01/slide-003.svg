<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGlow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4" rx="0"/>

  <!-- Title -->
  <text
    x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-1">The Evolution of AI</text>

  <!-- Title underline -->
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4" rx="0"/>

  <!-- Item 1: Rules-Based Systems -->
  <text x="80"  y="245" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#8b7fd4" letter-spacing="1">01</text>
  <text x="152" y="245" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="600" fill="#ffffff" letter-spacing="0">Rules-Based Systems</text>
  <text x="152" y="296" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="300" fill="#c4baea" letter-spacing="1">Hand-coded if/then logic; fast and predictable but brittle — breaks on any unplanned scenario</text>

  <!-- Connector arrow 1 → 2 -->
  <text x="104" y="375" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" fill="#8b7fd4" text-anchor="middle" opacity="0.6">↓</text>

  <!-- Item 2: Machine Learning -->
  <text x="80"  y="435" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#8b7fd4" letter-spacing="1">02</text>
  <text x="152" y="435" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="600" fill="#ffffff" letter-spacing="0">Machine Learning</text>
  <text x="152" y="486" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="300" fill="#c4baea" letter-spacing="1">Learns patterns from data — spam filters, recommendation engines, and fraud detection</text>

  <!-- Connector arrow 2 → 3 -->
  <text x="104" y="565" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" fill="#8b7fd4" text-anchor="middle" opacity="0.6">↓</text>

  <!-- Item 3: Deep Learning -->
  <text x="80"  y="625" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#8b7fd4" letter-spacing="1">03</text>
  <text x="152" y="625" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="600" fill="#ffffff" letter-spacing="0">Deep Learning</text>
  <text x="152" y="676" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="300" fill="#c4baea" letter-spacing="1">Neural networks with many layers; made practical by GPUs — breakthrough behind ImageNet 2012</text>

  <!-- Connector arrow 3 → 4 -->
  <text x="104" y="755" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" fill="#8b7fd4" text-anchor="middle" opacity="0.6">↓</text>

  <!-- Item 4: Generative AI -->
  <text x="80"  y="815" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#8b7fd4" letter-spacing="1">04</text>
  <text x="152" y="815" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="600" fill="#ffffff" letter-spacing="0">Generative AI</text>
  <text x="152" y="866" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="300" fill="#c4baea" letter-spacing="1">Produces new content (text, code, images) — the model creates rather than classifies; Copilot is here</text>
</svg>
