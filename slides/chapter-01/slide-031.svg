<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="cardGlow1" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6b5fb5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cardGlow2" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6b5fb5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cardGlow3" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6b5fb5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGlow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <!-- Title -->
  <text x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">The Model Context Protocol (MCP)</text>

  <!-- Title underline -->
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <!-- ── Diagram ── -->

  <!-- MCP Client box -->
  <rect x="60" y="168" width="440" height="256" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="280" y="222"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="40" fill="#8b7fd4" text-anchor="middle">🤖</text>
  <text x="280" y="266"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle">MCP Client</text>
  <text x="280" y="298"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="21" font-weight="300" fill="#a89fd0" text-anchor="middle">Your Agent / Application</text>
  <rect x="110" y="314" width="340" height="2" fill="#8b7fd4" fill-opacity="0.4"/>
  <text x="280" y="344"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="21" font-weight="300" fill="#c4baea" text-anchor="middle">① discovers tools at startup</text>
  <text x="280" y="376"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="21" font-weight="300" fill="#c4baea" text-anchor="middle">② calls tools by name + args</text>
  <text x="280" y="408"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="21" font-weight="300" fill="#c4baea" text-anchor="middle">③ receives structured results</text>

  <!-- Bidirectional arrows -->
  <!-- Top arrow: Client → Server (tool calls) -->
  <line x1="500" y1="272" x2="648" y2="272" stroke="#8b7fd4" stroke-width="2.5"/>
  <polygon points="648,260 670,272 648,284" fill="#8b7fd4"/>
  <text x="583" y="258"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="17" font-weight="300" fill="#a89fd0" text-anchor="middle">tool calls →</text>

  <!-- Bottom arrow: Server → Client (manifest + results) -->
  <line x1="660" y1="320" x2="512" y2="320" stroke="#8b7fd4" stroke-width="2.5"/>
  <polygon points="512,308 490,320 512,332" fill="#8b7fd4"/>
  <text x="583" y="344"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="17" font-weight="300" fill="#a89fd0" text-anchor="middle">← manifest + results</text>

  <!-- MCP Server box -->
  <rect x="670" y="168" width="1190" height="256" rx="16" fill="#ffffff" fill-opacity="0.10" stroke="#8b7fd4" stroke-width="2"/>
  <text x="1265" y="212"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle">⚙️  MCP Server</text>
  <text x="1265" y="246"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="21" font-weight="300" fill="#a89fd0" text-anchor="middle">Registers tools and exposes them to any MCP-compatible client</text>

  <!-- Tool chips -->
  <rect x="902" y="264" width="102" height="32" rx="16" fill="#8b7fd4" fill-opacity="0.35" stroke="#8b7fd4" stroke-width="1"/>
  <text x="953" y="285"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">GitHub</text>

  <rect x="1020" y="264" width="86" height="32" rx="16" fill="#8b7fd4" fill-opacity="0.35" stroke="#8b7fd4" stroke-width="1"/>
  <text x="1063" y="285"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Maps</text>

  <rect x="1122" y="264" width="86" height="32" rx="16" fill="#8b7fd4" fill-opacity="0.35" stroke="#8b7fd4" stroke-width="1"/>
  <text x="1165" y="285"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Clock</text>

  <rect x="1224" y="264" width="142" height="32" rx="16" fill="#8b7fd4" fill-opacity="0.35" stroke="#8b7fd4" stroke-width="1"/>
  <text x="1295" y="285"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">FileSystem</text>

  <rect x="1382" y="264" width="120" height="32" rx="16" fill="#8b7fd4" fill-opacity="0.35" stroke="#8b7fd4" stroke-width="1"/>
  <text x="1442" y="285"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Database</text>

  <rect x="1518" y="264" width="106" height="32" rx="16" fill="#8b7fd4" fill-opacity="0.35" stroke="#8b7fd4" stroke-width="1"/>
  <text x="1571" y="285"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Custom…</text>

  <!-- Divider -->
  <rect x="710" y="312" width="1110" height="2" fill="#8b7fd4" fill-opacity="0.4"/>

  <!-- Transport row -->
  <text x="1265" y="346"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="21" font-weight="600" fill="#8b7fd4" text-anchor="middle">Transport:</text>
  <text x="1265" y="376"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="21" font-weight="300" fill="#c4baea" text-anchor="middle">📡 stdio — child process (npm · Docker · native exe)    ·    🌐 SSE / HTTP — remote web service over HTTPS</text>
  <text x="1265" y="406"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="19" font-weight="300" fill="#a89fd0" text-anchor="middle">ListToolsAsync() works identically for both — transport is a deployment choice, not an API choice</text>

  <!-- ── Three cards ── -->

  <!-- Card 1: What Is MCP? -->
  <rect x="60" y="452" width="560" height="596" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#8b7fd4" stroke-width="1.5"/>
  <rect x="60" y="452" width="560" height="596" rx="16" fill="url(#cardGlow1)" fill-opacity="0.3"/>

  <text x="340" y="518"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="44" fill="#8b7fd4" text-anchor="middle">🔌</text>
  <text x="340" y="576"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">What Is MCP?</text>
  <rect x="120" y="594" width="440" height="3" fill="#8b7fd4" fill-opacity="0.5"/>
  <text x="340" y="638"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Open standard for AI-tool integration</text>
  <text x="340" y="682"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Originally created by Anthropic</text>
  <text x="340" y="726"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Client discovers tools at runtime</text>
  <text x="340" y="770"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Standardised call format and schema</text>
  <text x="340" y="826"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="300" fill="#a89fd0" text-anchor="middle">No custom glue code needed</text>
  <text x="340" y="860"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="300" fill="#a89fd0" text-anchor="middle">per integration</text>

  <!-- Card 2: Transport Options -->
  <rect x="680" y="452" width="560" height="596" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#8b7fd4" stroke-width="1.5"/>
  <rect x="680" y="452" width="560" height="596" rx="16" fill="url(#cardGlow2)" fill-opacity="0.3"/>

  <text x="960" y="518"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="44" fill="#8b7fd4" text-anchor="middle">🚌</text>
  <text x="960" y="576"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">Transport Options</text>
  <rect x="740" y="594" width="440" height="3" fill="#8b7fd4" fill-opacity="0.5"/>
  <text x="960" y="638"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">📡 stdio: server is a child process</text>
  <text x="960" y="674"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Launch via npm, Docker, or .exe</text>
  <text x="960" y="726"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">🌐 SSE / HTTP: remote web service</text>
  <text x="960" y="762"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Connect over HTTPS from anywhere</text>
  <text x="960" y="826"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="300" fill="#a89fd0" text-anchor="middle">Same ListToolsAsync() API for both</text>
  <text x="960" y="860"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="300" fill="#a89fd0" text-anchor="middle">— transport is a deployment detail</text>

  <!-- Card 3: The Ecosystem -->
  <rect x="1300" y="452" width="560" height="596" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#8b7fd4" stroke-width="1.5"/>
  <rect x="1300" y="452" width="560" height="596" rx="16" fill="url(#cardGlow3)" fill-opacity="0.3"/>

  <text x="1580" y="518"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="44" fill="#8b7fd4" text-anchor="middle">🌍</text>
  <text x="1580" y="576"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">The Ecosystem</text>
  <rect x="1360" y="594" width="440" height="3" fill="#8b7fd4" fill-opacity="0.5"/>
  <text x="1580" y="638"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Growing library of ready-made servers</text>
  <text x="1580" y="682"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">GitHub, Maps, Slack, databases</text>
  <text x="1580" y="726"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Filesystem, browsers, code tools</text>
  <text x="1580" y="770"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Build your own in three .NET lines</text>
  <text x="1580" y="826"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="300" fill="#a89fd0" text-anchor="middle">Any MCP server works with</text>
  <text x="1580" y="860"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="300" fill="#a89fd0" text-anchor="middle">any MCP client — plug and play</text>
</svg>
